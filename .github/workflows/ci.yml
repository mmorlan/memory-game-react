name: CI

on:
  pull_request:
    branches: [dev, staging, main]

jobs:
  ci:
    name: Lint, typecheck, build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint (ESLint)
        run: npm run lint

      - name: Typecheck
        run: npx tsc --noEmit

      - name: Build
        run: npm run build
        env:
          NEXT_PUBLIC_AWS_REGION: ${{ secrets.NEXT_PUBLIC_AWS_REGION }}
          NEXT_PUBLIC_COGNITO_USER_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_USER_POOL_ID }}
          NEXT_PUBLIC_COGNITO_APP_CLIENT_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_APP_CLIENT_ID }}
          NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID: ${{ secrets.NEXT_PUBLIC_COGNITO_IDENTITY_POOL_ID }}
          AWS_READONLY_KEY_ID: ${{ secrets.AWS_READONLY_KEY_ID }}
          AWS_READONLY_SECRET: ${{ secrets.AWS_READONLY_SECRET }}
