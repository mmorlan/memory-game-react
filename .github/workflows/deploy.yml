name: Deploy

on:
  push:
    branches: [dev, staging, main]

jobs:
  deploy:
    name: Deploy to Vercel
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Pull Vercel environment
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: team_CzMeRQIEaq7mM7Q9BqMuHumb
          VERCEL_PROJECT_ID: prj_L5Q49iNmkfjbu8njda3aOYh2AhaG

      - name: Build
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}
          else
            vercel build --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: team_CzMeRQIEaq7mM7Q9BqMuHumb
          VERCEL_PROJECT_ID: prj_L5Q49iNmkfjbu8njda3aOYh2AhaG

      - name: Deploy
        id: deploy
        run: |
          if [ "${{ github.ref_name }}" = "main" ]; then
            echo "url=$(vercel deploy --prebuilt --prod --token=${{ secrets.VERCEL_TOKEN }})" >> $GITHUB_OUTPUT
          else
            vercel deploy --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
          fi
        env:
          VERCEL_ORG_ID: team_CzMeRQIEaq7mM7Q9BqMuHumb
          VERCEL_PROJECT_ID: prj_L5Q49iNmkfjbu8njda3aOYh2AhaG

      - name: Assign alias (production only)
        if: github.ref_name == 'main'
        run: vercel alias set ${{ steps.deploy.outputs.url }} pairanoia.vercel.app --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: team_CzMeRQIEaq7mM7Q9BqMuHumb
          VERCEL_PROJECT_ID: prj_L5Q49iNmkfjbu8njda3aOYh2AhaG
