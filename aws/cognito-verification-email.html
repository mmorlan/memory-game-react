<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Verify your Pairanoia account</title>
</head>
<body style="margin:0;padding:0;background-color:#111827;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#111827;padding:48px 16px;">
    <tr>
      <td align="center">
        <table width="100%" cellpadding="0" cellspacing="0" style="max-width:480px;">

          <!-- Logo / Title -->
          <tr>
            <td align="center" style="padding-bottom:32px;">
              <span style="color:#00ff3c;font-size:28px;font-weight:700;letter-spacing:0.05em;">PAIRANOIA</span>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#1f2937;border-radius:12px;padding:40px 36px;">

              <p style="margin:0 0 8px 0;color:#9ca3af;font-size:13px;text-transform:uppercase;letter-spacing:0.08em;">Welcome</p>
              <h1 style="margin:0 0 24px 0;color:#f9fafb;font-size:22px;font-weight:600;line-height:1.3;">
                Verify your account
              </h1>
              <p style="margin:0 0 32px 0;color:#9ca3af;font-size:15px;line-height:1.6;">
                Click the button below to confirm your email and start playing.
              </p>

              <!-- Verify button -->
              <div style="text-align:center;margin-bottom:32px;">
                {##Verify my account##}
              </div>

              <p style="margin:0;color:#6b7280;font-size:13px;line-height:1.6;">
                This link expires in 24 hours. If you didn't create a Pairanoia account, you can safely ignore this email.
              </p>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:24px;">
              <p style="margin:0;color:#4b5563;font-size:12px;">
                &copy; Pairanoia. All rights reserved.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
